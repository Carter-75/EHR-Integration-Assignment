version: '3.8'

services:
  backend:
    build:
      context: ./EHR
      dockerfile: ../Dockerfile.backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      # OPENAI_API_KEY can be passed from host environment here:
      # - OPENAI_API_KEY=${OPENAI_API_KEY}

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "4173:4173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
